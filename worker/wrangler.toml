name = "adrastea-r2-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:6100,http://100.121.7.83:5173,http://100.121.7.83:6100,https://jupiter-systems.pages.dev,https://jupiter-systems.vercel.app"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "adrastea-assets"

[[d1_databases]]
binding = "DB"
database_name = "adrastea-db"
database_id = "3816e6dc-5093-47da-8811-ea36ea6257c2"

[env.staging]
name = "adrastea-r2-proxy-staging"

[env.staging.vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:6100,http://100.121.7.83:5173,http://100.121.7.83:6100,https://jupiter-systems-git-feat-adrastea-deploy-6m10cmuks-projects.vercel.app"

[[env.staging.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "adrastea-assets-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "adrastea-db-staging"
database_id = "85dbbfe6-be34-4f1c-82a3-42d938053afa"

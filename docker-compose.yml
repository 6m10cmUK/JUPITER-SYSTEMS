services:
  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "6100:6100"
    env_file:
      - .env.local
    command: sh -c "npm install && npm run dev"
    environment:
      - HOST=0.0.0.0

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  frontend_node_modules:
